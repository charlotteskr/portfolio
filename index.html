<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charlotte Skråmestø</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --ink: #1c1c1a;
      --muted: #888;
      --light: #d4d4d4;
      --side: clamp(1.5rem, 8vw, 7rem);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--white);
      color: var(--ink);
      font-family: 'Roboto', sans-serif;
      font-weight: 300;
      font-size: 1rem;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.4rem var(--side);
    }

    .nav-links {
      display: flex;
      justify-content: space-between;
      width: 100%;
      list-style: none;
    }

    .nav-links a {
      font-family: 'Roboto', sans-serif;
      font-weight: 300;
      font-size: 0.95rem;
      color: var(--ink);
      text-decoration: none;
    }
    .nav-links a:hover { text-decoration: underline; }

    /* hamburger — mobile only */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
    }
    .hamburger span {
      display: block;
      width: 22px; height: 1px;
      background: var(--ink);
      transition: transform 0.3s, opacity 0.3s;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    .mobile-menu {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--white);
      z-index: 99;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-size: 1.8rem;
      font-weight: 300;
      color: var(--ink);
      text-decoration: none;
    }

    /* ── MAIN CONTENT ── */
    main {
      padding: 0 var(--side);
    }

    /* ── NAME ── */
    .hero-name {
      text-align: center;
      font-family: 'Roboto', sans-serif;
      font-weight: 300;
      font-size: clamp(2.6rem, 6vw, 5.2rem);
      letter-spacing: 0.01em;
      margin: 2.5rem 0 3rem;
    }

    /* ── PROJECT LIST ── */
    .projects-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 3rem;
    }

    .project-item {
      display: block;
      font-family: 'Roboto', sans-serif;
      font-weight: 300;
      font-size: clamp(1rem, 2vw, 1.15rem);
      color: var(--ink);
      text-decoration: none;
      padding: 0.55rem 0;
      transition: opacity 0.2s;
    }
    .project-item:hover { opacity: 0.5; }

    /* ── IMAGE BLOCK ── */
    .image-block {
      width: 100%;
      aspect-ratio: 16 / 5;
      background: var(--light);
      margin-bottom: 4rem;
    }

    /* ── CONTACT / FOOTER ── */
    .contact {
      padding: 0 var(--side);
      padding-bottom: 1rem;
    }

    .contact-link {
      display: block;
      font-family: 'Roboto', sans-serif;
      font-weight: 300;
      font-size: clamp(0.9rem, 1.5vw, 1rem);
      color: var(--ink);
      text-decoration: none;
      margin-bottom: 0.4rem;
    }
    .contact-link:hover { text-decoration: underline; }

    footer {
      padding: 1.5rem var(--side) 1.5rem;
      margin-top: 0.5rem;
    }
    .footer-copy {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 300;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }

      nav {
        justify-content: flex-end;
      }

      .hero-name { margin: 2rem 0 2rem; }
      .image-block { aspect-ratio: 4/3; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav id="navbar">
    <ul class="nav-links">
      <li><a href="#hjem">hjem</a></li>
      <li><a href="#prosjekter">prosjekter</a></li>
      <li><a href="#kontakt">kontakt</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Meny">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="#hjem" class="mobile-link">hjem</a>
    <a href="#prosjekter" class="mobile-link">prosjekter</a>
    <a href="#kontakt" class="mobile-link">kontakt</a>
  </div>

  <!-- MAIN -->
  <main id="hjem">

    <!-- Name -->
    <h1 class="hero-name">charlotte skråmestø</h1>

    <!-- Projects -->
    <div class="projects-list" id="prosjekter">
      <a class="project-item" href="#">ks kunnskap</a>
      <a class="project-item" href="mjospromenaden.html">mjøspromenaden</a>
      <a class="project-item" href="#">smArt</a>
      <a class="project-item" href="#">norkart</a>
    </div>

    <!-- Image placeholder -->
    <div class="image-block"></div>

  </main>

  <!-- Contact -->
  <section class="contact" id="kontakt">
    <a href="mailto:charlotteskramesto@gmail.com" class="contact-link">charlotteskramesto@gmail.com</a>
    <a href="https://linkedin.com" target="_blank" rel="noopener" class="contact-link">linkedin</a>
  </section>

  <!-- Footer -->
  <footer>
    <span class="footer-copy">Charlotte Skråmestø | 2026</span>
  </footer>

  <script>
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      mobileMenu.classList.toggle('open');
      document.body.style.overflow = mobileMenu.classList.contains('open') ? 'hidden' : '';
    });
    document.querySelectorAll('.mobile-link').forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('open');
        mobileMenu.classList.remove('open');
        document.body.style.overflow = '';
      });
    });
  </script>
</body>
</html>
